<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SILABITO - Sitio web del desarrollador">
    <title>SILABITO - Desarrollador</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #8B5CF6 0%, #A78BFA 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            color: #8B5CF6;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        
        .app-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 30px 0;
        }
        
        .app-info h2 {
            color: #8B5CF6;
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        
        .app-info p {
            color: #555;
            margin-bottom: 10px;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 0.9em;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #6B46C1 0%, #7C3AED 100%);
            }
            
            .container {
                background: #1a1a1a;
                color: #e0e0e0;
            }
            
            h1 {
                color: #A78BFA;
            }
            
            p {
                color: #b0b0b0;
            }
            
            .app-info {
                background: #2a2a2a;
            }
            
            .app-info h2 {
                color: #A78BFA;
            }
            
            .app-info p {
                color: #d0d0d0;
            }
            
            .footer {
                border-top-color: #333;
                color: #888;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 SILABITO</h1>
        <p>Bienvenido al sitio web del desarrollador</p>
        
        <div class="app-info">
            <h2>Acerca de la App</h2>
            <p><strong>SILABITO</strong> es un juego de rompecabezas de palabras para iOS/iPadOS.</p>
            <p>Desarrollado con Swift 6.2 y SwiftUI</p>
        </div>
        
        <div class="footer">
            <p>© 2025 SILABITO. Todos los derechos reservados.</p>
            <p>Este sitio es necesario para la verificación de AdMob.</p>
        </div>
    </div>
</body>
</html>
